# 公众号文章编辑器 - 完整 Docker Compose 配置
# 一键启动：docker compose up -d
# 本地开发：docker compose up -d postgres redis   # 只启依赖，前后端本地运行

version: '3.8'

services:
  # ========= PostgreSQL =========
  postgres:
    image: postgres:16-alpine
    container_name: mp-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-wechat_editor}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - mp-net

  # ========= Redis =========
  redis:
    image: redis:7-alpine
    container_name: mp-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - mp-net

  # ========= 后端 API =========
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mp-api
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - ./backend/.env
    environment:
      # 覆盖：确保数据库地址指向 Docker 网络内的 postgres/redis
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-wechat_editor}
      - REDIS_URL=redis://${REDIS_PASSWORD:-}@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python", "-c", "import http.client; conn = http.client.HTTPConnection('localhost', 8000); conn.request('GET', '/api/health'); res = conn.getresponse(); exit(0 if res.status == 200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - mp-net

  # ========= 前端（生产环境用）=========
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: mp-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - api
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget", "-q", "http://127.0.0.1/health", "-O", "/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - mp-net

  # ========= Nginx 反向代理（可选，统一入口）==========
  nginx:
    image: nginx:alpine
    container_name: mp-nginx
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - api
    restart: unless-stopped
    networks:
      - mp-net

networks:
  mp-net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
