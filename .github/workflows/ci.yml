name: CI - Lint, Test & Build Verify

on:
  push:
    branches: [main, develop]
  pul_request:
    branches: [main, develop]

permissions:
  contents: read
  packages: write

env:
  PYTHONVERSION: "3.11"
  NODE_VERSION: "22"
  # Docker Hub 配置（CD workflow 使用）
  DOCKER_REGISTRY: docker.io
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

jobs:
  # ========== 后端 Lint & Test ==========
  backend-test:
    name: Backend Test (Python)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: wechat_editor_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHONVERSION }}
          cache: 'pip'

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run Alembic migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/wechat_editor_test
          REDIS_URL: redis://localhost:6379/0
        run: alembic upgrade head

      - name: Run backend tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/wechat_editor_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test-secret
          OPENAI_API_KEY: sk-test
          DEEPEEK_API_KEY: sk-test
        run: pytest -v

  # ========== 前端 Lint & Test ==========
  frontend-test:
    name: Frontend Test (Vue 3)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (x multiple linters may be used)
        run: |
          npx vue-tsc --noEmit || true
          npm run lint || true

      - name: Type check
        run: npx vue-tsc --noEmit

      - name: Unit tests (vitest)
        run: npx vitest run || true

  # ========== 构建验证（确保 Docker 镜像能构建）==========
  build-verify:
    name: Docker Build Verify
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (verify)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: false
          load: true
          tags: mp-editor-backend:ci-test

      - name: Build frontend image (verify)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: false
          load: true
          tags: mp-editor-frontend:ci-test

      - name: Verify images start (smoke test)
        run: |
          # 用 docker compose 快速验证镜像能跑起来
          cp .env.example .env
          docker compose up -d postgres redis
          docker compose up -d --no-deps api frontend 2>&1 || true
          sleep 15
          curl -f http://localhost:8000/api/health || (echo "Backend health check failed!" && exit 1)
          curl -f http://localhost:80/ || (echo "Frontend smoke test failed!" && exit 1)
          echo "✅ Smoke test passed!"
          docker compose down
